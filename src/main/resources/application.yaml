spring:
  application:
    name: omin
  data:
    redis:
      port: 6379
      host: localhost
  datasource:
    #host: localhost, 포트: 5432, DB명: omindb
    url: jdbc:postgresql://localhost:5432/omindb
    username: omin_user
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: never  # data.sql을 실행시마다 반영

  jpa:
    hibernate:
      ddl-auto: update # 엔티티 변경 시 DB 테이블 자동 갱신
    show-sql: true     # 실행되는 SQL을 로그로 출력
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true

  # 이미지 / 파일 관련:
  servlet:
    multipart: # 파일 용량을 지정
      max-file-size: 10MB
      max-request-size: 10MB

  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS}
        secret-key: ${AWS_SECRET}
      region:
        static: ap-northeast-2 # 아시아 태평양(서울)
      s3:
        bucket:
          omin-dev-test

  # OPEN AI

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-5-nano

  # Google smtp
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
      auth-code-expiration-millis: 300000

app:
  seed:
    enabled: false  # TODO(prod): 운영에서는 반드시 false 또는 local 프로필로 제한할 것
kakao:
  rest-api-key: ${KAKAO_REST_API_KEY}

jwt:
  secret: ${JWT_SECRET}