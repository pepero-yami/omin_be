spring:
  application:
    name: omin
  data:
    redis:
      port: 6379
      host: localhost
  datasource:
    #host: localhost, 포트: 5432, DB명: omindb
    url: jdbc:postgresql://localhost:5432/omindb
    username: omin_user
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update # 엔티티 변경 시 DB 테이블 자동 갱신
    show-sql: true     # 실행되는 SQL을 로그로 출력
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart: # 파일 용량을 지정
      max-file-size: 10MB
      max-request-size: 10MB


  # OPEN AI

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-5-nano

app:
  seed:
    enabled: false  # TODO(prod): 운영에서는 반드시 false 또는 local 프로필로 제한할 것
kakao:
  rest-api-key: ${KAKAO_REST_API_KEY}

jwt:
  secret: ${JWT_SECRET}